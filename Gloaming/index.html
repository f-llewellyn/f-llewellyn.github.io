<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.13.0/css/all.css" integrity="sha384-Bfad6CLCknfcloXFOyFnlgtENryhrpZCe29RTifKEixXQZ38WheV+i/6YWSzkz3V" crossorigin="anonymous">
    <link rel="stylesheet" href="./main.css">
    <title>Gloaming</title>
</head>
<body>
    
    <header>
        <h1>Gloaming</h1>
        <h4>The sunset gallery</h4>
    </header>

    <div class="info">
        <h2>Image name</h2>
    </div>

    <div class="showcase"></div>

    <div id="slider">
        <button id="back" onclick="imgLast()"><i class="fas fa-arrow-circle-left"></i></button>
        <img src="" name="slide">
        <button id="next" onclick="imgNext()"><i class="fas fa-arrow-circle-right"></i></button>
    </div>

    <div class="info">
        <p>This image is by <a href="#">John Doe</a> on <a href="https://pexels.com">Pexels</a></p>
    </div>

    <footer>
        <h4>This will hopefully use the <a target="_blank" href="https://pexels.com">Pexels Photo API</a></h4>
        <p>Written by Finn Llewellyn</p>
    </footer>

    <script src="./main.js"></script>
</body>
</html>
