<!DOCTYPE html>
<html>
    <head>
	<script>
		$(function(){
  			$('#video').css({ width: $(window).innerWidth() + 'px', height: $(window).innerHeight() + 'px' });

  			$(window).resize(function(){
    				$('#video').css({ width: $(window).innerWidth() + 'px', height: $(window).innerHeight() + 'px' });
  			});
		});
	 </script>
    </head>
    <body>
	<iframe id="video" src="https://www.youtube.com/embed/dQw4w9WgXcQ?rel=0&autoplay=1" frameborder="0" allow="autoplay" allowfullscreen></iframe>
    </body>
</html>
